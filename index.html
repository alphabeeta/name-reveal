<!DOCTYPE html>
<html lang="en">
<head>
    <!-- This meta tag forces the browser to display emojis and Telugu fonts correctly -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Name Reveal!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Floating Background Decorations -->
    <div class="decorations">
        <!-- New Floating Cradle -->
        <div class="cradle">&#128716;</div> 
        
        <div class="balloon balloon1">&#127880;</div>
        <div class="balloon balloon2">&#127880;</div>
        <div class="balloon balloon3">&#127880;</div>
        <div class="balloon balloon4">&#127880;</div>
        <div class="star star1">&#10024;</div>
        <div class="star star2">&#10024;</div>
    </div>

    <div class="reveal-container">
        <h1>We are excited to announce...</h1>
        <p>Click the heart to reveal our little one's name! &#10024;</p>
        
        <!-- Expanded Reveal Box -->
        <div class="reveal-card" id="revealCard" onclick="revealName()">
            <div class="card-front">
                <span class="heart-icon">&#128150;</span>
                <h3>Click to Reveal</h3>
            </div>
            <div class="card-back">
                <div class="confetti-effect">&#127881; &#10024; &#127881;</div>
                <h2 class="baby-name english">Dhrithika Vrinda</h2> 
                <h2 class="baby-name telugu">ధృతిక వ్రింద</h2> 
                <div class="confetti-effect">&#127881; &#10024; &#127881;</div>
            </div>
        </div>
    </div>

    <script>
        function revealName() {
            const card = document.getElementById('revealCard');
            card.classList.toggle('flipped');
        }
    </script>
</body>
</html>
