<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Name Reveal!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Container for the dynamic balloon stream -->
    <div class="balloon-container" id="balloonContainer"></div>

    <!-- Minimal Floating Stars -->
    <div class="decorations">
        <div class="star star1">&#10024;</div>
        <div class="star star2">&#10024;</div>
    </div>

    <div class="reveal-container">
        <!-- Minimal Indian Cradle Line Art -->
        <div class="cradle-top">
            <svg viewBox="0 0 100 100" width="80" height="80" xmlns="http://www.w3.org/2000/svg">
                <path d="M20,80 Q20,20 50,20 Q80,20 80,80" fill="none" stroke="#fa709a" stroke-width="2.5" stroke-linecap="round"/>
                <line x1="35" y1="28" x2="35" y2="60" stroke="#fa709a" stroke-width="1.5" />
                <line x1="65" y1="28" x2="65" y2="60" stroke="#fa709a" stroke-width="1.5" />
                <rect x="28" y="60" width="44" height="12" rx="4" fill="none" stroke="#fa709a" stroke-width="2.5"/>
                <circle cx="50" cy="20" r="3" fill="#e05275"/>
                <circle cx="35" cy="72" r="2" fill="#e05275"/>
                <circle cx="50" cy="72" r="2" fill="#e05275"/>
                <circle cx="65" cy="72" r="2" fill="#e05275"/>
            </svg>
        </div>

        <h1 id="headingText">We are excited to announce...</h1>
        <p id="subText">Click the heart to reveal our little one's name! &#10024;</p>
        
        <!-- Expanded Reveal Box -->
        <div class="reveal-card" id="revealCard" onclick="revealName()">
            <div class="card-front" id="cardFront">
                <span class="heart-icon" id="heartIcon">&#128150;</span>
                <h3 id="clickText">Click to Reveal</h3>
            </div>
            <div class="card-back">
                <div class="confetti-effect">&#127881; &#10024; &#127881;</div>
                <h2 class="baby-name english">Dhrithika Vrinda</h2> 
                <h2 class="baby-name telugu">ధృతిక వ్రింద</h2> 
                <div class="confetti-effect">&#127881; &#10024; &#127881;</div>
            </div>
        </div>
    </div>

    <script>
        let balloonInterval;

        function createSingleBalloon() {
            const container = document.getElementById('balloonContainer');
            const balloon = document.createElement('div');
            balloon.classList.add('floating-balloon');
            balloon.innerHTML = '&#127880;';
            
            balloon.style.left = Math.random() * 100 + 'vw';
            balloon.style.fontSize = (Math.random() * 1.5 + 2) + 'rem';
            balloon.style.animationDuration = (Math.random() * 2.5 + 3.5) + 's';
            
            container.appendChild(balloon);
            
            setTimeout(() => {
                balloon.remove();
            }, 6000);
        }

        function revealName() {
            const card = document.getElementById('revealCard');
            const clickText = document.getElementById('clickText');
            
            // Set Target Date: July 20, 2026 at 11:00 AM
            const targetDate = new Date("July 20, 2026 11:00:00").getTime();
            const now = new Date().getTime();

            // IF locked (current time is before target time)
            if (now < targetDate) {
                // Change subtext temporarily to Telugu prompt
                clickText.innerText = "కొంచెం ఆగుతారా? Till July 20, 11 AM";
                clickText.style.color = "#e05275";
                clickText.style.fontSize = "1.5rem";
                
                // Trigger an error shake animation
                card.classList.add('shake-effect');
                setTimeout(() => {
                    card.classList.remove('shake-effect');
                }, 5000);
                return; // Stop execution here so it doesn't flip
            }

            // IF unlocked (after July 20, 11 AM)
            card.classList.toggle('flipped');
            
            if(card.classList.contains('flipped')) {
                card.classList.add('pop-effect');
                setTimeout(() => card.classList.remove('pop-effect'), 400);

                // Immediate balloon burst
                for (let i = 0; i < 8; i++) {
                    setTimeout(createSingleBalloon, i * 50);
                }
                
                // Continuous balloon flow
                balloonInterval = setInterval(createSingleBalloon, 350); 
            } else {
                clearInterval(balloonInterval);
                document.getElementById('balloonContainer').innerHTML = '';
            }
        }
    </script>
</body>
</html>
